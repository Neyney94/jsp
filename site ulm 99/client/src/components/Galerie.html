<!-- Section Galerie ULM Records - HTML pur -->
<section class="public-view" id="gallerySection">
  <div class="public-events-page">
    <div class="gallery-header">
      <div class="gallery-kicker">ULM Records</div>
      <h2 class="gallery-title">Galerie / Portfolio</h2>
      <p class="gallery-subtitle">Découvrez nos projets musicaux, clips, albums et singles produits par ULM Records.</p>
    </div>
    <div class="gallery-filters" id="galleryFilters">
      <button class="gallery-filter-btn active" data-filter="all">Tous</button>
      <button class="gallery-filter-btn" data-filter="album">Albums</button>
      <button class="gallery-filter-btn" data-filter="single">Singles</button>
      <button class="gallery-filter-btn" data-filter="clip">Clips</button>
      <button class="gallery-filter-btn" data-filter="autre">Autre</button>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</section>
