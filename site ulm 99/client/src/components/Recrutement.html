<!-- Section Recrutement ULM Records - HTML pur -->
<section class="contract-view public-view" id="recruitmentSection">
  <div class="contract-shell recruitment-shell">
    <div class="contract-card recruitment-card">
      <div class="recruitment-intro">
        <div class="recruitment-kicker">ULM Records</div>
        <h2 class="contract-title">Recrutement</h2>
        <p class="recruitment-subtitle">Envoyez votre candidature pour rejoindre l'équipe ULM. Les demandes arrivent directement dans l'administration.</p>
      </div>
      <form class="contract-form" id="recruitmentForm">
        <div class="recruitment-grid">
          <div class="contract-field full-width">
            <label for="recruitmentFullName">Nom & Prénom</label>
            <input class="contract-input" id="recruitmentFullName" type="text" />
          </div>
          <div class="contract-field">
            <label for="recruitmentBirth">Date de naissance</label>
            <input class="contract-input" id="recruitmentBirth" type="date" />
          </div>
          <div class="contract-field">
            <label for="recruitmentPhone">N° de téléphone</label>
            <input class="contract-input" id="recruitmentPhone" type="text" />
          </div>
          <div class="contract-field full-width">
            <label for="recruitmentAvailability">Vos disponibilités détaillées pour travailler</label>
            <textarea class="contract-input" id="recruitmentAvailability"></textarea>
          </div>
          <div class="contract-field full-width">
            <label for="recruitmentPresentation">Votre présentation</label>
            <textarea class="contract-input" id="recruitmentPresentation"></textarea>
          </div>
          <div class="contract-field full-width">
            <label for="recruitmentMotivation">Vos motivations</label>
            <textarea class="contract-input" id="recruitmentMotivation"></textarea>
          </div>
        </div>
        <button class="contract-submit" type="submit">Envoyer la candidature</button>
        <p class="contract-feedback" id="recruitmentFeedback">Candidature envoyée.</p>
      </form>
    </div>
  </div>
</section>
